<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management App</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="px-10">
    <section
        class="popup-action fixed z-10 bg-black/70 w-full h-full top-0 left-0 flex items-center justify-center p-4 opacity-0 pointer-events-none duration-150">
        <div
            class="popup-container bg-white p-4 rounded-2xl min-w-md shadow-md translate-y-6 opacity-0 delay-100 duration-300">
            <h2 class="text-center font-medium mb-2">
                Are you sure you want to delete this task
            </h2>
            <div class="flex items-center gap-2 justify-center">
                <button id="confirmDelete" class="text-red-600 bg-red-200 px-4 rounded-2xl py-2 cursor-pointer">
                    Yes, Delete
                </button>
                <button id="cancelDelete" class="bg-gray-200 text-gray-700 px-4 rounded-2xl py-2 cursor-pointer">
                    No, Cancel
                </button>
            </div>
        </div>
    </section>
    <section class="curd-app py-10">
        <div class="container mx-auto">
            <div class="header mb-2">
                <h2 class="text-2xl font-medium uppercase">Cruds App</h2>
                <p class="text-sm max-w-md">
                    Easily manage your daily tasks, track progress, and stay productive with a simple and intuitive task management system.
                </p>
            </div>
            <div class="task-form shadow-md p-4 rounded-2xl border border-zinc-300">
                <form id="taskForm" class="space-y-4">
                    <p id="errorMessage"
                        class="bg-red-100 text-red-500 p-4 rounded-2xl text-center max-w-1/2 mx-auto text-sm hidden">
                    </p>
                    <div class="task-input">
                        <label for="title" class="capitalize mb-1 font-medium inline-block">title</label>
                        <input type="text" name="title" id="title"
                            class="px-4 h-10 border border-zinc-300 rounded-2xl w-full"
                            placeholder="Enter Task Title" />
                    </div>
                    <!-- Description -->
                    <div class="task-input">
                        <label for="description" class="capitalize mb-1 font-medium inline-block">description</label>
                        <textarea name="description" id="description"
                            class="px-4 h-36 py-4 border border-zinc-300 rounded-2xl w-full"
                            placeholder="Enter Task Description"></textarea>
                    </div>
                    <!-- Status -->
                    <div class="task-status">
                        <label for="taskStatus" class="capitalize mb-1 font-medium inline-block">status</label>
                        <select name="taskStatus" id="taskStatus"
                            class="px-4 h-10 border border-zinc-300 rounded-2xl w-full">
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>
                    <!-- Buttons(Add, Cancel) -->
                    <div class="task-form-btns flex gap-2">
                        <button type="submit" id="addTask"
                            class="bg-sky-950 text-white px-4 rounded-2xl py-2 cursor-pointer">
                            Add Task
                        </button>
                        <button id="cancelTask" type="button"
                            class="bg-red-600 text-white px-4 rounded-2xl py-2 cursor-pointer hidden">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <section class="tasks py-10">
        <div class="container mx-auto">
            <div class="flex gap-4 flex-col lg:flex-row">
                <!-- Search -->
                <div class="task-input mb-2">
                    <label for="search" class="capitalize mb-1 font-medium inline-block">search</label>
                    <input type="text" name="search" id="search" class="px-4 h-10 border border-zinc-300 rounded-2xl"
                        placeholder="Search tasks..." />
                </div>
                <!-- Status Filter -->
                <div class="status-filter flex items-center gap-4 mb-4">
                    <label for="statusFilter" class="capitalize mb-1 font-medium inline-block">filter by status</label>
                    <select name="statusFilter" id="statusFilter"
                        class="px-4 h-10 border border-zinc-300 rounded-2xl max-w-xs">
                        <option value="All">All</option>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
            </div>

            <div class="tasks-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Tasks will be dynamically inserted here -->
            </div>
        </div>
    </section>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./index.js"></script>
</body>

</html>
